{% extends "admin/base.html" %}

{% block title %}{{ mode }} - APK 分发后台{% endblock %}

{% block content %}
<header class="page-header">
  <div>
    <h1>{{ mode }}</h1>
    <p>推广链接格式为入口域名加 <code>?c=推广码</code>，专属 APK 为空时使用线路默认 APK。</p>
  </div>
  <a class="btn" href="/admin/promos">返回列表</a>
</header>

{% match error %}
{% when Some with (message) %}
  <div class="alert danger">{{ message }}</div>
{% when None %}
{% endmatch %}

<form class="panel padded form-grid" method="post" action="{{ action }}">
  <label>
    <span>所属线路</span>
    <select name="route_id" required>
      {% for route in routes %}
      <option value="{{ route.id }}" {% if promo.route_id == route.id %}selected{% endif %}>{{ route.name }} · {{ route.entry_domain }}</option>
      {% endfor %}
    </select>
  </label>

  <label>
    <span>推广码</span>
    <input name="code" value="{{ promo.code }}" placeholder="A1B2C3" required>
  </label>

  <label>
    <span>名称</span>
    <input name="name" value="{{ promo.name }}" placeholder="渠道或分站名称">
  </label>

  <label class="span-2">
    <span>专属 APK 下载直链</span>
    <input name="apk_url" value="{{ promo.apk_url }}" placeholder="为空则使用线路默认 APK">
  </label>

  <div class="check-row">
    <label>
      <input type="checkbox" name="enabled" value="1" {% if promo.enabled %}checked{% endif %}>
      <span>启用推广码</span>
    </label>
  </div>

  <div class="form-actions">
    <button class="btn primary" type="submit">保存</button>
    <a class="btn" href="/admin/promos">取消</a>
  </div>
</form>
{% endblock %}
