<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>{% block title %}APK 分发后台{% endblock %}</title>
    <link rel="stylesheet" href="/static/admin.css?v=20260709-preview2">
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">AB</div>
          <div class="brand-copy">
            <div class="brand-title">APK 分发后台</div>
            <div class="brand-subtitle">Distribution Console</div>
          </div>
        </div>
        <nav class="nav">
          <a class="nav-link {% if active == "dashboard" %}active{% endif %}" href="/admin">数据总览</a>
          <a class="nav-link {% if active == "routes" %}active{% endif %}" href="/admin/routes">线路管理</a>
          <a class="nav-link {% if active == "domains" %}active{% endif %}" href="/admin/domains">域名库</a>
          <a class="nav-link {% if active == "landing" %}active{% endif %}" href="/admin/landing">落地页</a>
          <a class="nav-link {% if active == "cloak" %}active{% endif %}" href="/admin/cloak">分流策略</a>
          <a class="nav-link {% if active == "meta" %}active{% endif %}" href="/admin/meta">Meta</a>
          <a class="nav-link {% if active == "promos" %}active{% endif %}" href="/admin/promos">推广码</a>
          <a class="nav-link {% if active == "visits" %}active{% endif %}" href="/admin/visits">访问记录</a>
          <a class="nav-link {% if active == "settings" %}active{% endif %}" href="/admin/settings">系统设置</a>
        </nav>
        <form class="sidebar-footer" method="post" action="/admin/logout">
          <div class="session-card">
            <span class="session-dot"></span>
            <div>
              <strong>管理会话</strong>
              <span>已登录</span>
            </div>
          </div>
          <button class="logout" type="submit">退出登录</button>
        </form>
      </aside>
      <main class="main">
        <header class="topbar">
          <div>
            <span class="eyebrow">AB Control</span>
            <strong>运营工作台</strong>
          </div>
          <span class="status-pill"><span></span> 在线</span>
        </header>
        <div class="content">
          {% block content %}{% endblock %}
        </div>
      </main>
    </div>
    <dialog class="confirm-dialog" id="confirm-dialog">
      <form method="dialog" class="confirm-card">
        <h2 id="confirm-title">确认操作</h2>
        <p id="confirm-message">该操作执行后不能直接撤销。</p>
        <div class="confirm-actions">
          <button class="btn" value="cancel" type="submit">取消</button>
          <button class="btn danger" id="confirm-submit" value="confirm" type="submit">确认</button>
        </div>
      </form>
    </dialog>
    <script>
      (() => {
        const csrfToken = document.querySelector('meta[name="csrf-token"]')?.content || "";
        for (const form of document.querySelectorAll('form[method="post"]')) {
          if (!form.querySelector('input[name="csrf_token"]')) {
            const input = document.createElement("input");
            input.type = "hidden";
            input.name = "csrf_token";
            input.value = csrfToken;
            form.prepend(input);
          }
        }

        const dialog = document.getElementById("confirm-dialog");
        const message = document.getElementById("confirm-message");
        const submit = document.getElementById("confirm-submit");
        let pendingForm = null;

        document.addEventListener("submit", (event) => {
          const form = event.target;
          if (!(form instanceof HTMLFormElement) || !form.dataset.confirm) {
            return;
          }
          if (form.dataset.confirmed === "1") {
            delete form.dataset.confirmed;
            return;
          }
          if (!dialog || typeof dialog.showModal !== "function") {
            if (!window.confirm(form.dataset.confirm)) {
              event.preventDefault();
            }
            return;
          }
          event.preventDefault();
          pendingForm = form;
          message.textContent = form.dataset.confirm;
          dialog.showModal();
        });

        submit?.addEventListener("click", () => {
          const form = pendingForm;
          pendingForm = null;
          dialog.close();
          if (form) {
            form.dataset.confirmed = "1";
            form.requestSubmit();
          }
        });

        dialog?.addEventListener("close", () => {
          pendingForm = null;
        });

        const landingPreviewDialog = document.getElementById("landing-preview");
        const landingPreviewFrame = document.getElementById("landing-preview-frame");
        const landingPreviewTitle = document.getElementById("landing-preview-title");
        const landingPreviewOpen = document.getElementById("landing-preview-open");
        const landingPreviewStage = document.querySelector("[data-preview-stage]");
        let landingPreviewShellUrl = "";
        let landingPreviewDevice = "mobile";

        const previewUrlForDevice = (url, device) => {
          if (!url) return "#";
          const separator = url.includes("?") ? "&" : "?";
          return `${url}${separator}device=${encodeURIComponent(device)}`;
        };

        const setPreviewDevice = (device) => {
          landingPreviewDevice = device === "desktop" ? "desktop" : "mobile";
          if (landingPreviewStage instanceof HTMLElement) {
            landingPreviewStage.dataset.previewStage = landingPreviewDevice;
          }
          for (const button of document.querySelectorAll("[data-preview-device]")) {
            const active = button instanceof HTMLElement && button.dataset.previewDevice === landingPreviewDevice;
            button.classList.toggle("active", active);
          }
          if (landingPreviewOpen instanceof HTMLAnchorElement) {
            landingPreviewOpen.href = previewUrlForDevice(landingPreviewShellUrl, landingPreviewDevice);
          }
        };

        landingPreviewDialog?.addEventListener("close", () => {
          if (landingPreviewFrame instanceof HTMLIFrameElement) {
            landingPreviewFrame.src = "about:blank";
          }
        });

        document.addEventListener("click", (event) => {
          const button = event.target;
          const previewButton = button instanceof HTMLElement ? button.closest("[data-preview-open]") : null;
          if (previewButton instanceof HTMLElement) {
            const url = previewButton.dataset.previewUrl || "";
            if (!url) return;
            landingPreviewShellUrl = previewButton.dataset.previewShellUrl || url;
            if (landingPreviewTitle) {
              landingPreviewTitle.textContent = `预览落地页：${previewButton.dataset.previewTitle || ""}`;
            }
            if (landingPreviewFrame instanceof HTMLIFrameElement) {
              landingPreviewFrame.src = url;
            }
            setPreviewDevice("mobile");
            if (landingPreviewDialog instanceof HTMLDialogElement) {
              landingPreviewDialog.showModal();
            } else {
              window.open(previewUrlForDevice(landingPreviewShellUrl, landingPreviewDevice), "_blank", "noopener");
            }
            return;
          }
          const previewDeviceButton = button instanceof HTMLElement ? button.closest("[data-preview-device]") : null;
          if (previewDeviceButton instanceof HTMLElement) {
            setPreviewDevice(previewDeviceButton.dataset.previewDevice || "desktop");
            return;
          }
          const openButton = button instanceof HTMLElement ? button.closest("[data-modal-open]") : null;
          if (openButton instanceof HTMLElement) {
            const modal = document.getElementById(openButton.dataset.modalOpen || "");
            if (modal instanceof HTMLDialogElement) {
              modal.showModal();
            }
            return;
          }
          const closeButton = button instanceof HTMLElement ? button.closest("[data-modal-close]") : null;
          if (closeButton instanceof HTMLElement) {
            const modal = closeButton.closest("dialog");
            if (modal instanceof HTMLDialogElement) {
              modal.close();
            }
            return;
          }
          const copyButton = button instanceof HTMLElement ? button.closest("[data-copy-text]") : null;
          if (copyButton instanceof HTMLElement) {
            const text = copyButton.dataset.copyText || "";
            if (navigator.clipboard && text) {
              navigator.clipboard.writeText(text).then(() => {
                const original = copyButton.textContent;
                copyButton.textContent = "已复制";
                window.setTimeout(() => {
                  copyButton.textContent = original;
                }, 1200);
              });
            }
            return;
          }
          if (!(button instanceof HTMLElement) || !button.dataset.togglePanel) {
            return;
          }
          const panel = document.getElementById(button.dataset.togglePanel);
          if (!panel) {
            return;
          }
          panel.hidden = !panel.hidden;
          button.textContent = panel.hidden ? "编辑" : "收起";
        });

        const applyModeVisibility = (select) => {
          const target = select.dataset.toggleTarget;
          if (!target) return;
          const value = select.value;
          const scope = select.closest("dialog") || select.closest("form") || document;
          for (const field of scope.querySelectorAll(`[data-mode-field^="${target}:"]`)) {
            const mode = field.dataset.modeField.split(":")[1];
            const hidden = mode !== value;
            field.hidden = hidden;
            for (const control of field.querySelectorAll("input, select, textarea, button")) {
              control.disabled = hidden;
            }
          }
        };
        for (const select of document.querySelectorAll("select[data-toggle-target]")) {
          applyModeVisibility(select);
          select.addEventListener("change", () => applyModeVisibility(select));
        }

        const applyPreviewVisibility = (select) => {
          const group = select.dataset.previewSelect;
          if (!group) return;
          const value = select.value;
          const scope = select.closest("form") || document;
          const placeholder = scope.querySelector(`[data-preview-placeholder="${group}"]`);
          if (placeholder instanceof HTMLElement) {
            placeholder.hidden = value !== "";
          }
          for (const item of scope.querySelectorAll(`[data-preview-option^="${group}:"]`)) {
            item.hidden = item.dataset.previewOption !== `${group}:${value}`;
          }
        };
        for (const select of document.querySelectorAll("select[data-preview-select]")) {
          applyPreviewVisibility(select);
          select.addEventListener("change", () => applyPreviewVisibility(select));
        }
      })();
    </script>
  </body>
</html>
