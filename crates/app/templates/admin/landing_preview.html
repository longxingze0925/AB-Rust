<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>预览落地页：{{ name }}</title>
    <style>
      :root {
        --bg: #eef2f6;
        --surface: #ffffff;
        --border: #dbe2ea;
        --text: #151922;
        --muted: #647183;
        --primary: #0f766e;
        --primary-dark: #115e59;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        background: var(--bg);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .preview-shell {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
      }

      .preview-bar {
        min-width: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 18px;
        border-bottom: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.92);
      }

      .preview-title {
        min-width: 0;
        display: grid;
        gap: 2px;
      }

      .preview-title strong {
        overflow: hidden;
        font-size: 15px;
        font-weight: 820;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .preview-title span {
        color: var(--muted);
        font-size: 12px;
      }

      .preview-switch {
        display: inline-flex;
        flex: 0 0 auto;
        gap: 3px;
        padding: 3px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #f5f7fa;
      }

      .preview-switch a {
        min-width: 64px;
        min-height: 32px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 6px 12px;
        border-radius: 6px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        text-decoration: none;
      }

      .preview-switch a.active {
        background: var(--surface);
        color: var(--primary-dark);
        box-shadow: 0 1px 2px rgba(21, 25, 34, 0.06);
      }

      .preview-canvas {
        min-width: 0;
        min-height: 0;
        padding: 18px;
        overflow: auto;
      }

      .preview-frame {
        display: block;
        border: 1px solid var(--border);
        background: #ffffff;
        box-shadow: 0 18px 46px rgba(21, 25, 34, 0.14);
      }

      .preview-canvas.mobile {
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }

      .preview-canvas.mobile .preview-frame {
        width: min(390px, 100%);
        height: min(844px, calc(100vh - 100px));
        min-height: 680px;
        border-radius: 24px;
      }

      .preview-canvas.desktop .preview-frame {
        width: 100%;
        height: calc(100vh - 100px);
        min-height: 680px;
        border-radius: 8px;
      }

      @media (max-width: 720px) {
        .preview-bar {
          align-items: stretch;
          flex-direction: column;
        }

        .preview-switch {
          width: 100%;
        }

        .preview-switch a {
          flex: 1 1 0;
        }

        .preview-canvas {
          padding: 10px;
        }
      }
    </style>
  </head>
  <body>
    <main class="preview-shell">
      <header class="preview-bar">
        <div class="preview-title">
          <strong>预览落地页：{{ name }}</strong>
          <span>预览模式不会记录访问、下载或 Meta 事件。</span>
        </div>
        <nav class="preview-switch" aria-label="预览设备">
          <a href="?device=mobile" class="{% if device == "mobile" %}active{% endif %}">手机</a>
          <a href="?device=desktop" class="{% if device == "desktop" %}active{% endif %}">电脑</a>
        </nav>
      </header>
      <section class="preview-canvas {{ device }}">
        <iframe class="preview-frame" title="落地页预览" src="{{ frame_url }}"></iframe>
      </section>
    </main>
  </body>
</html>
